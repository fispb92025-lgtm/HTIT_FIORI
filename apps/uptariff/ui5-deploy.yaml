# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: uptariff
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: HTIT_dev
          url: https://my428934.s4hana.cloud.sap
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZUI_UPLTARIFF
          package: ZPK_UPLOAD_EXCEL
          transport: BDQK900437
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
